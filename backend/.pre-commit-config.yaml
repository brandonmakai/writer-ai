repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv --project backend run mypy .
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv --project backend run pytest
        language: system
        pass_filenames: false